<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Образование и дипломы — Татьяна Наумкина</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'"/>
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/></noscript>
<style>
:root {
  --cream: #FAF7F2;
  --warm-white: #FFFDF9;
  --sand: #E8E0D4;
  --taupe: #C4B8A8;
  --dark: #2C2416;
  --text: #3D3328;
  --muted: #7A6E62;
  --accent: #C17F4A;
  --accent-light: #F0DCC8;
  --accent-dark: #A06535;
  --font-d: 'Cormorant Garamond', Georgia, serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);font-size:1.05rem;color:var(--text);background:var(--warm-white);line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 40px;display:flex;justify-content:space-between;align-items:center;height:68px;background:rgba(255,253,249,.93);backdrop-filter:blur(14px);border-bottom:1px solid rgba(196,184,168,.22)}
.nav-logo{font-family:var(--font-d);font-size:1.3rem;font-weight:700;color:var(--dark)}
.nav-back{font-size:.9rem;color:var(--muted);display:flex;align-items:center;gap:7px;transition:color .2s;font-weight:500}
.nav-back:hover{color:var(--accent)}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:120px 40px 80px;text-align:center}
.stub{max-width:500px}
.stub-tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent-dark);padding:5px 16px;border-radius:100px;font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:24px}
.stub h1{font-family:var(--font-d);font-size:clamp(2rem,4vw,2.8rem);color:var(--dark);font-weight:700;line-height:1.15;margin-bottom:16px}
.stub p{font-size:1rem;color:var(--muted);line-height:1.75;font-weight:300;margin-bottom:36px}
.btn-back{display:inline-flex;align-items:center;gap:9px;border:1.5px solid var(--sand);color:var(--muted);padding:12px 24px;border-radius:100px;font-family:var(--font-b);font-size:.92rem;font-weight:600;transition:all .2s}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}

footer{background:#150F06;padding:24px 40px;display:flex;justify-content:center}
.foot-meta{font-size:.8rem;color:rgba(255,255,255,.2)}

@media(max-width:600px){nav{padding:0 20px}main{padding:96px 24px 60px}footer{padding:20px 24px}}
</style>
</head>
<body>

<nav>
  <span class="nav-logo">Татьяна Наумкина</span>
  <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> На главную</a>
</nav>

<main>
  <div class="stub">
    <div class="stub-tag"><i class="fa-solid fa-circle-dot"></i> Скоро</div>
    <h1>Образование и дипломы</h1>
    <p>Страница в разработке. Здесь появятся документы об образовании и повышении квалификации.</p>
    <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Вернуться на главную</a>
  </div>
</main>

<footer><p class="foot-meta">© 2026 Татьяна Наумкина</p></footer>

</body>
</html>
