  'B+A': 'Гиперответственность сопровождается тревогой: вы боитесь подвести, сделать не так, не успеть.',
  'B+C': 'Вы много делаете для других, но не говорите о своих потребностях. Накапливается обида и усталость.',
  'B+D': 'Вы давно работаете на износ, но не можете остановиться. Тело уже сигналит — а вы продолжаете.',
  'C+A': 'То, что остаётся невысказанным, превращается в тревогу и внутреннее напряжение.',
  'C+B': 'Сложно говорить о своих потребностях, поэтому берёте всё на себя. Круг замыкается.',
  'C+D': 'Подавленные эмоции вытягивают последние силы. Когда нельзя выговориться — тело устаёт вдвойне.',
  'D+A': 'Истощение сопровождается тревогой, которая не даёт нормально отдохнуть даже в редкие тихие моменты.',
  'D+B': 'Вы истощены, но продолжаете нести ответственность за других. Себя в этом уравнении почти нет.',
  'D+C': 'Усталость и невысказанность — тяжёлая смесь. Сил нет, а поделиться этим не с кем или не получается.',
};

// Restore answers from sessionStorage if available
let savedAnswers = null;
try { savedAnswers = JSON.parse(sessionStorage.getItem(STORAGE_KEY)); } catch(e) {}
const answers = (savedAnswers && savedAnswers.length === TOTAL) ? savedAnswers : new Array(TOTAL).fill(null);
let current = 0;
let quizStarted = false;

// beforeunload warning — only active while quiz is in progress
function handleBeforeUnload(e) {
  e.preventDefault();
  e.returnValue = '';
}

function saveProgress() {
  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(answers)); } catch(e) {}
}

function clearProgress() {
  try { sessionStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

function startQuiz() {
  document.getElementById('introScreen').style.display = 'none';
  const qs = document.getElementById('quizScreen');
  qs.style.display = 'flex';
  quizStarted = true;
  window.addEventListener('beforeunload', handleBeforeUnload);
  showQuestion(current);
}

function showQuestion(idx) {
  current = idx;
  const q = questions[idx];
  document.getElementById('qNumber').textContent = 'Вопрос ' + (idx + 1);
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressText').textContent = 'Вопрос ' + (idx + 1) + ' из ' + TOTAL;
  const pct = Math.round(idx / TOTAL * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCounter').textContent = pct + '%';
  document.getElementById('prevBtn').disabled = idx === 0;

  // Clear any selection flash from previous question
  document.querySelectorAll('.a-btn').forEach(b => {
    b.classList.remove('selected-yes', 'selected-no');
  });
}

function answer(val) {
  // Flash visual confirmation
  const allBtns = document.querySelectorAll('.a-btn');
  allBtns.forEach(b => {
    b.classList.remove('selected-yes', 'selected-no');
    const isYes = b.classList.contains('score-1');
    if ((val === 1 && isYes) || (val === 0 && !isYes)) {
      b.classList.add(val === 1 ? 'selected-yes' : 'selected-no');
    }
  });

  answers[current] = val;
  saveProgress();

  setTimeout(() => {
    if (current < TOTAL - 1) {
      showQuestion(current + 1);
    } else {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressCounter').textContent = '100%';
      window.removeEventListener('beforeunload', handleBeforeUnload);
      clearProgress();
      showResult();
    }
  }, 180);
}

function prevQuestion() {
  if (current > 0) showQuestion(current - 1);
}

function showResult() {
  const scores = {A:0, B:0, C:0, D:0};
  const counts = {A:0, B:0, C:0, D:0};

  questions.forEach((q, i) => {
    counts[q.block]++;
    if (answers[i] === 1) scores[q.block]++;
  });

  const pcts = {};
  for (const b of ['A','B','C','D']) {
    pcts[b] = counts[b] > 0 ? Math.round(scores[b] / counts[b] * 100) : 0;
  }

  const totalYes = Object.values(scores).reduce((a, b) => a + b, 0);
  window.removeEventListener('beforeunload', handleBeforeUnload);

  let resultData;
  if (totalYes < 2) {
    resultData = { empty: true };
  } else {
    const order = ['A','B','C','D'];
    let winner = order[0];
    for (const b of order) { if (pcts[b] > pcts[winner]) winner = b; }
    const sorted = order.slice().sort((a,b) => pcts[b] - pcts[a]);
    const second = sorted[1];
    resultData = { winner, pcts, second };
  }

  try { sessionStorage.setItem('quiz_result_v1', JSON.stringify(resultData)); } catch(e) {}

  const loader = document.getElementById('pageLoader');
  loader.classList.add('active');
  setTimeout(() => {
    window.location.href = 'results.html';
  }, 300);
}
</script>
