<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../img/favicon.png"/>
  <link rel="icon" href="../img/favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ваш результат — Татьяна Наумкина</title>
  <meta name="description" content="Ваш результат теста: что незаметно забирает у вас силы каждый день."/>
  <link rel="canonical" href="https://naumkinatati.ru/test/results.html"/>
  <link rel="stylesheet" href="../fonts/fonts.css"/>
  <link rel="stylesheet" href="../fonts/fontawesome/css/all.min.css" media="print" onload="this.media='all'"/>
  <noscript><link rel="stylesheet" href="../fonts/fontawesome/css/all.min.css"/></noscript>
<style>
:root {
  --cream: #FAF7F2;
  --warm-white: #FFFDF9;
  --sand: #E8E0D4;
  --taupe: #C4B8A8;
  --dark: #2C2416;
  --text: #3D3328;
  --muted: #7A6E62;
  --accent: #C17F4A;
  --accent-light: #F0DCC8;
  --accent-dark: #A06535;
  --font-d: 'Cormorant Garamond', Georgia, serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
  --mw: 640px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);font-size:1.05rem;color:var(--text);background:var(--warm-white);line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

nav{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;padding:0 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,253,249,.93);backdrop-filter:blur(14px);border-bottom:1px solid rgba(196,184,168,.22)}
.nav-logo{font-family:var(--font-d);font-size:1.3rem;font-weight:700;color:var(--dark)}
.nav-logo em{color:var(--accent);font-style:normal}
.nav-back{font-size:.95rem;color:var(--muted);display:flex;align-items:center;gap:6px;transition:color .2s}
.nav-back:hover{color:var(--accent)}

.result-inner{max-width:var(--mw);margin:0 auto;width:100%;padding:104px 32px 80px;flex:1}

.result-tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent-dark);padding:5px 16px;border-radius:100px;font-size:.82rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px}
.result-title{font-family:var(--font-d);font-size:clamp(2rem,5vw,3.2rem);color:var(--dark);margin-bottom:12px;font-weight:700;line-height:1.2}
.result-subtitle{font-size:1.05rem;color:var(--muted);margin-bottom:36px;font-weight:300;line-height:1.75}

.bars-wrap{display:flex;flex-direction:column;gap:14px;margin-bottom:40px}
.bar-row{display:flex;flex-direction:column;gap:6px}
.bar-meta{display:flex;justify-content:space-between;align-items:baseline}
.bar-label{font-size:.9rem;font-weight:600;color:var(--text)}
.bar-pct{font-size:.9rem;font-weight:600;color:var(--accent)}
.bar-track{height:10px;background:var(--sand);border-radius:100px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent),var(--accent-dark));width:0%;transition:width 1s cubic-bezier(.4,0,.2,1);min-width:4px}
.bar-fill.secondary{background:linear-gradient(90deg,#C4B8A8,#A09080)}
.bar-fill.tertiary{background:#C4B8A8}

.result-main-block{background:var(--cream);border-radius:20px;padding:28px;margin-bottom:20px;border:1px solid var(--sand)}
.result-main-block h3{font-family:var(--font-d);font-size:1.4rem;color:var(--dark);margin-bottom:10px;font-weight:700}
.result-main-block p{font-size:1rem;color:var(--text);line-height:1.75;font-weight:300}

.result-secondary-block{background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;border:1px solid var(--sand)}
.result-secondary-block h4{font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.result-secondary-block p{font-size:.97rem;color:var(--text);line-height:1.7;font-weight:300}

.btn-result{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#fff;padding:18px 48px;border-radius:14px;font-family:var(--font-b);font-size:1.15rem;font-weight:600;cursor:pointer;border:none;transition:all .25s;box-shadow:0 4px 20px rgba(193,127,74,.35);margin-top:32px;text-decoration:none}
.btn-result:hover{background:var(--accent-dark);transform:translateY(-2px)}

.page-loader{position:fixed;inset:0;background:var(--warm-white);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.page-loader.active{opacity:1;pointer-events:all}
.loader-dots{display:flex;gap:8px}
.loader-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:ldot .9s ease-in-out infinite}
.loader-dot:nth-child(2){animation-delay:.15s}
.loader-dot:nth-child(3){animation-delay:.3s}
@keyframes ldot{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}

footer{background:#150F06;padding:24px 40px;display:flex;justify-content:center;margin-top:auto}
.foot-text{font-size:.9rem;color:rgba(255,255,255,.2)}

@media(max-width:768px){
  nav{padding:0 24px}
  .result-inner{padding:88px 24px 60px}
}
</style>
<script src="../js/consent.js"></script>
</head>
<body>

<div class="page-loader" id="pageLoader">
  <div class="loader-dots">
    <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
  </div>
</div>

<nav>
  <div class="nav-logo">Татьяна <em>Наумкина</em></div>
  <a href="index.html" class="nav-back">← Пройти заново</a>
</nav>

<div class="result-inner" id="resultInner"></div>

<footer><div class="foot-text">© Татьяна Наумкина</div></footer>

<script>
const blockInfo = {
  A: {
    name: 'Тревога',
    title: 'Ваш главный сценарий: тревога',
    subtitle: 'Силы забирает не усталость и не нагрузка — а постоянное внутреннее напряжение. Голова не выключается, даже когда снаружи всё спокойно.',
    main: {
      heading: 'Что происходит внутри',
      text: 'Вы живёте с ощущением фоновой тревоги, которая не зависит от реальных обстоятельств. Мозг постоянно сканирует: всё ли в порядке, не обидели ли кого-то, что может пойти не так. Это изматывает — даже когда внешне всё хорошо.'
    },
    page: 'result1.html'
  },
  B: {
    name: 'Гиперответственность',
    title: 'Ваш главный сценарий: гиперответственность',
    subtitle: 'Силы забирает невозможность остановиться. Вы делаете для других больше, чем для себя, и не можете иначе — даже когда уже нет ресурса.',
    main: {
      heading: 'Что происходит внутри',
      text: 'Вы несёте ответственность за всё вокруг: за результат, за других людей, за то, чтобы никого не подвести. Попросить о помощи почти невозможно. Отказать — тоже. В итоге вы тянете всё сами и ждёте, что это хотя бы заметят.'
    },
    page: 'result2.html'
  },
  C: {
    name: 'Подавленные эмоции',
    title: 'Ваш главный сценарий: подавленные эмоции',
    subtitle: 'Силы забирает то, что остаётся невысказанным. Вы сдерживаете себя так долго, что уже не всегда понимаете, что чувствуете на самом деле.',
    main: {
      heading: 'Что происходит внутри',
      text: 'Вы привыкли говорить «всё нормально» и держать внутри то, что на самом деле не нравится или болит. Не потому что не чувствуете — а потому что говорить об этом сложно или страшно. Напряжение копится и выходит не там, где хотелось бы.'
    },
    page: 'result3.html'
  },
  D: {
    name: 'Истощение',
    title: 'Ваш главный сценарий: истощение',
    subtitle: 'Силы на нуле — и отдых уже не помогает восстановиться так, как раньше. Тело и голова работают на износ.',
    main: {
      heading: 'Что происходит внутри',
      text: 'Вы давно не просыпались по-настоящему отдохнувшим. Делаете всё нужное, но без радости. Мелочи стали выбивать из колеи сильнее, чем прежде. Это не лень и не слабость — это сигнал, что резервы закончились.'
    },
    page: 'result4.html'
  }
};

const secondaryTexts = {
  'A+B': 'Тревога усиливается тем, что вы не можете позволить себе расслабиться: всегда есть ответственность, которую нужно нести.',
  'A+C': 'Тревога подпитывается тем, что вы не говорите о том, что вас беспокоит. Невысказанное остаётся внутри и давит.',
  'A+D': 'Тревога на фоне истощения — особенно тяжёлое сочетание. Сил нет, но голова не выключается.',
  'B+A': 'Гиперответственность сопровождается тревогой: вы боитесь подвести, сделать не так, не успеть.',
  'B+C': 'Вы много делаете для других, но не говорите о своих потребностях. Накапливается обида и усталость.',
  'B+D': 'Вы давно работаете на износ, но не можете остановиться. Тело уже сигналит — а вы продолжаете.',
  'C+A': 'То, что остаётся невысказанным, превращается в тревогу и внутреннее напряжение.',
  'C+B': 'Сложно говорить о своих потребностях, поэтому берёте всё на себя. Круг замыкается.',
  'C+D': 'Подавленные эмоции вытягивают последние силы. Когда нельзя выговориться — тело устаёт вдвойне.',
  'D+A': 'Истощение сопровождается тревогой, которая не даёт нормально отдохнуть даже в редкие тихие моменты.',
  'D+B': 'Вы истощены, но продолжаете нести ответственность за других. Себя в этом уравнении почти нет.',
  'D+C': 'Усталость и невысказанность — тяжёлая смесь. Сил нет, а поделиться этим не с кем или не получается.',
};

const blockNames = {A:'Тревога', B:'Гиперответственность', C:'Подавленные эмоции', D:'Истощение'};

function renderEmpty() {
  document.getElementById('resultInner').innerHTML = `
    <div class="result-tag"><i class="fa-solid fa-circle-dot"></i> Ваш результат</div>
    <div class="result-title">Похоже, сейчас всё в порядке</div>
    <div class="result-subtitle">Вы ответили «нет» на большинство вопросов, это хороший знак. Возможно, вы уже работаете над собой, или этот период просто спокойнее обычного.</div>
    <div class="result-main-block" style="margin-bottom:32px">
      <p>Если что-то всё же ощущается не так, но не попало в вопросы, первая сессия поможет разобраться, что именно происходит.</p>
    </div>
    <a href="https://forms.yandex.ru/u/6a1e8dd45056902074ddfc28/" target="_blank" class="btn-result">
      Записаться на сессию
    </a>
  `;
}

function renderResult(data) {
  const { winner, pcts, second } = data;
  const info = blockInfo[winner];
  const sorted = ['A','B','C','D'].slice().sort((a,b) => pcts[b] - pcts[a]);

  const barsHtml = sorted.map((b, i) => {
    const fillClass = i === 0 ? 'bar-fill' : i === 1 ? 'bar-fill secondary' : 'bar-fill tertiary';
    return `
      <div class="bar-row">
        <div class="bar-meta">
          <span class="bar-label">${blockNames[b]}</span>
          <span class="bar-pct">${pcts[b]}%</span>
        </div>
        <div class="bar-track"><div class="${fillClass}" data-pct="${pcts[b]}"></div></div>
      </div>`;
  }).join('');

  const key = winner + '+' + second;
  const secText = secondaryTexts[key] || '';
  const secHtml = (secText && pcts[second] >= 33)
    ? `<div class="result-secondary-block"><h4>Также заметно: ${blockNames[second].toLowerCase()}</h4><p>${secText}</p></div>`
    : '';

  document.getElementById('resultInner').innerHTML = `
    <div class="result-tag"><i class="fa-solid fa-circle-dot"></i> Ваш результат</div>
    <div class="result-title">${info.title}</div>
    <div class="result-subtitle">${info.subtitle}</div>
    <div class="bars-wrap" id="barsWrap">${barsHtml}</div>
    <div class="result-main-block"><h3>${info.main.heading}</h3><p>${info.main.text}</p></div>
    ${secHtml}
    <button class="btn-result" onclick="goToResult()">Узнать, что с этим делать</button>
  `;

  const barFills = document.querySelectorAll('.bar-fill[data-pct]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const pct = parseInt(el.dataset.pct);
        el.style.width = pct === 0 ? '0px' : Math.max(pct, 8) + '%';
        observer.unobserve(el);
      }
    });
  }, { threshold: 0.1 });
  barFills.forEach(el => observer.observe(el));

  window._resultPage = info.page;
}

function goToResult() {
  const loader = document.getElementById('pageLoader');
  loader.classList.add('active');
  setTimeout(() => {
    window.location.href = window._resultPage;
  }, 300);
}

(function init() {
  let data = null;
  try { data = JSON.parse(sessionStorage.getItem('quiz_result_v1')); } catch(e) {}
  if (!data) {
    window.location.href = 'index.html';
    return;
  }
  if (data.empty) {
    renderEmpty();
  } else {
    renderResult(data);
  }
})();
</script>
</body>
</html>
